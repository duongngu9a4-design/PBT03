<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CSS Selector Demo</title>

<style>

    /* 1. Chọn tất cả h1 */
    h1{
        color:red;
    }

    /* 2. Chọn theo class */
    .price{
        color:green;
        font-weight:bold;
    }

    /* 3. Chọn header bên trong #app */
    #app header{
        border:3px solid black;
        padding:10px;
    }

    /* 4. Chọn thẻ a đầu tiên trong nav */
    nav a:first-child{
        color:aqua;
        font-size:25px;
    }

    /* 5. Chọn h2 nằm trong element có cả
       class product và featured */
    .product.featured h2{
        color:orange;
        background:black;
    }

    /* 6. Chọn p là con trực tiếp của article */
    article > p{
        background:lightblue;
    }

    /* 7. Chọn a có href="/" */
    a[href="/"]{
        background:chocolate;
        color:white;
    }

    /* 8. Chọn h1 bên trong element có
       class top-bar và dark */
    .top-bar.dark h1{
        text-decoration:underline;
    }

</style>
</head>

<body>

<div id="app">

    <header class="top-bar dark">

        <h1>ShopTLU</h1>

        <nav>
            <a href="/" class="active">Home</a>
            <a href="/products">Products</a>
            <a href="/about">About</a>
        </nav>

    </header>

    <main>

        <article class="product">

            <h2>iPhone 16</h2>

            <p class="price">25.990.000đ</p>

            <p>Mô tả sản phẩm iPhone...</p>

        </article>

        <hr>

        <article class="product featured">

            <h2>MacBook Pro</h2>

            <p class="price">45.990.000đ</p>

            <p>Mô tả sản phẩm MacBook...</p>

        </article>

    </main>

</div>

</body>
</html>
